name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: shards install --production

      - name: Build release binary
        run: crystal build ./src/api.cr --release --no-debug -o battler_api_server

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H 134.209.176.149 >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_deploy battler_api_server groot@134.209.176.149:/opt/battler/battler_api_server
          ssh -i ~/.ssh/id_deploy groot@134.209.176.149 "sudo systemctl restart battler"
