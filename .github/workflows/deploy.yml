name: Deploy API

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: shards install --production

      - name: Build release binary
        run: crystal build ./src/api.cr --release --no-debug -o battler_api_server

      - name: Deploy to server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H 134.209.176.149 >> ~/.ssh/known_hosts
          scp -i ~/.ssh/id_deploy battler_api_server groot@134.209.176.149:/opt/battler/battler_api_server
          ssh -i ~/.ssh/id_deploy groot@134.209.176.149 "sudo systemctl restart battler"

  build-cli:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
          - os: macos-13
            name: macos-amd64
          - os: macos-latest
            name: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: latest

      - name: Install dependencies
        run: shards install --production

      - name: Build CLI binary
        run: crystal build ./src/cli.cr --release --no-debug -o battler-${{ matrix.name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: battler-${{ matrix.name }}
          path: battler-${{ matrix.name }}

  release:
    needs: build-cli
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: bin

      - name: Prepare binaries
        run: |
          mv bin/battler-linux-amd64/battler-linux-amd64 bin/battler-linux-amd64.bin
          mv bin/battler-macos-amd64/battler-macos-amd64 bin/battler-macos-amd64.bin
          mv bin/battler-macos-arm64/battler-macos-arm64 bin/battler-macos-arm64.bin
          rm -rf bin/battler-linux-amd64 bin/battler-macos-amd64 bin/battler-macos-arm64
          chmod +x bin/*

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Dernière version du CLI Battler, compilée depuis `main` (${{ github.sha }}).

            - `battler-linux-amd64.bin` — Linux x86_64
            - `battler-macos-amd64.bin` — macOS Intel
            - `battler-macos-arm64.bin` — macOS Apple Silicon
          prerelease: true
          make_latest: true
          files: bin/*
